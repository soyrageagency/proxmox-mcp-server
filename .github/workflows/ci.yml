name: CI

# Build, type-check and smoke-test the MCP server on every push/PR.
# Runs headless — no Proxmox host required (tools register regardless).
#
# Crafted by SoyRage Agency — https://soyrage.es/

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Build & smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Smoke test (tools, read-only, plugins, identity)
        run: node scripts/smoke.mjs
